name: Deploy to Alibaba Cloud ECS

on:
    push:
        branches: [main]
    workflow_dispatch:

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build
              run: pnpm run build

            - name: Setup SSH
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  # 用固定 host key 替代 ssh-keyscan，防止 MITM
                  echo "${{ secrets.ECS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
                  chmod 644 ~/.ssh/known_hosts

            - name: Deploy via rsync
              run: |
                  rsync -avz --delete \
                    -e "ssh -i ~/.ssh/id_ed25519 -p ${{ secrets.ECS_PORT || 22 }}" \
                    dist/ \
                    ${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:${{ secrets.ECS_TARGET }}
